<template>
    <lightning-card>

        <!-- LOGIN / REGISTER -->
        <template if:false={isAuthenticated}>

            <!-- LOGIN -->
            <template if:false={isRegisterMode}>
                <div class="auth-wrapper">
                    <div class="auth-card">

                        <div class="auth-header">
                            <lightning-icon icon-name="utility:lock" size="large"></lightning-icon>
                            <h2>Secure Access</h2>
                            <p>Enter 4-digit password</p>
                        </div>

                        <lightning-input data-id="password" type="password"
                            label="Password"
                            placeholder="Enter 4-digit PIN"
                            maxlength="4"
                            inputmode="numeric"
                            pattern="[0-9]{4}"
                            required
                            value={password}
                            onchange={handlePasswordChange}>
                        </lightning-input>

                        <lightning-button label="Unlock" variant="brand" onclick={handleLoad}>
                        </lightning-button>

                    </div>
                </div>
            </template>

            <!-- REGISTER -->
            <template if:true={isRegisterMode}>
                <div class="auth-wrapper">
                    <div class="auth-card">

                        <h2>Create Password</h2>

                        <lightning-input type="password" label="Password"
                            maxlength="4"
                            pattern="[0-9]{4}"
                            value={password}
                            disabled>
                        </lightning-input>

                        <lightning-input type="password"
                            label="Confirm Password"
                            maxlength="4"
                            inputmode="numeric"
                            pattern="[0-9]{4}"
                            placeholder="Enter 4-digit PIN"
                            value={confirmPassword}
                            onchange={handleConfirmPasswordChange}>
                        </lightning-input>

                        <lightning-button label="Create" variant="brand" onclick={handleRegister}></lightning-button>
                        <lightning-button label="Back" onclick={handleBackToLogin}></lightning-button>

                    </div>
                </div>
            </template>

        </template>

        <!-- MAIN APP -->
        <template if:true={isAuthenticated}>

            <div class="header">
                <h2>📝 Smart Content Editor</h2>
              <span class={statusClass}>
    {modeLabel}
</span>
            </div>

            <div class="container">

                <!-- TEXT AREA -->
                <textarea class="custom-textarea"
                    oninput={handleChange}
                    disabled={isDisabled}>{content}</textarea>

                <!-- INFO -->
                <div class="info-bar">
                    Characters: {charCount} / 90000
                </div>

                <!-- PASSWORD -->
                <div class="password-display">
                    🔑 Session Password: <strong>{password}</strong>
                </div>

                <!-- FILE UPLOAD -->
               <div class="file-upload">
    <lightning-file-upload
        label="Upload Files (Max 3)"
        record-id={recordId}
        multiple
        accept=".pdf,.png,.jpg,.txt,.doc,.docx"
        onuploadfinished={handleUploadFinished}>
    </lightning-file-upload>

    <template if:true={uploadedFiles}>
        <div>
            <p><strong>Uploaded Files:</strong></p>

            <template for:each={uploadedFiles} for:item="file">
                <div key={file.documentId}>
                    📄 
                    <a href={file.downloadUrl} target="_blank">
                        {file.name}
                    </a>
                </div>
            </template>
        </div>
    </template>
</div>

                <!-- BUTTONS -->
                <div class="btns">

                    <lightning-button label="Download" onclick={handleDownload}></lightning-button>
                    <lightning-button label="Copy" onclick={handleCopy}></lightning-button>

                    <lightning-button label="Edit" onclick={handleEdit} disabled={isEditable}></lightning-button>

                    <lightning-button label="Save" variant="brand"
                        onclick={handleSubmit}
                        disabled={isSaveDisabled}></lightning-button>

                    <lightning-button label="Clear" onclick={handleClear}></lightning-button>

                    <lightning-button label="Back" variant="destructive" onclick={handleBack}></lightning-button>

                </div>

            </div>

        </template>

    </lightning-card>
</template>
